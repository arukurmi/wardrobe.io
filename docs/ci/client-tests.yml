# Move to .github/workflows/ after granting the git token `workflow` scope
# (gh auth refresh -h github.com -s workflow)
name: client tests
on:
  push:
    paths: ['client/**', '.github/workflows/client-tests.yml']
  pull_request:
    paths: ['client/**']
jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
